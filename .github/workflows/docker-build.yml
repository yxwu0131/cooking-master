name: build-and-push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # web 运行镜像（standalone runner）→ :latest
      - name: Build & push web (runner)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: ghcr.io/yxwu0131/cooking-master:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 一次性建表+种子镜像（builder，含 prisma CLI + tsx + seed.ts）→ :migrate
      - name: Build & push migrate (builder)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: builder
          push: true
          tags: ghcr.io/yxwu0131/cooking-master:migrate
          cache-from: type=gha
          cache-to: type=gha,mode=max
